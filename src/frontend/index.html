<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>步态实时监测系统 - 监控端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://webapi.amap.com/maps?v=2.0&key=b89336ecafc28315501f354a9024f29d"></script>
    <style>
        * { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }
        body { background: #f1f5f9; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; transition: all 0.3s; }
        .online { background: #22c55e; box-shadow: 0 0 10px #22c55e; }
        .offline { background: #ef4444; }
        .glass { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border: 1px solid rgba(226,232,240,0.8); }
        .card-hover { transition: transform 0.2s, box-shadow 0.2s; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
        .mono { font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .btn-active { background: #3b82f6 !important; color: white !important; }
        @keyframes fadeIn { from { opacity: 0; transform: scale(0.95); } to { opacity: 1; transform: scale(1); } }
        .modal-enter { animation: fadeIn 0.2s ease-out; }
        #map-container { position: relative; width: 100%; height: 100%; }
        #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
        #rel-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: none; }
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col">

    <!-- 顶部栏 -->
    <header class="bg-slate-900 text-white px-6 py-3 flex justify-between items-center shadow-lg z-20">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-lg bg-blue-500/20 flex items-center justify-center text-xl">🏃</div>
            <h1 class="text-lg font-bold tracking-wide">步态实时监测系统</h1>
        </div>
        <div class="flex items-center gap-6 text-sm">
            <div class="flex items-center gap-2"><span>后端:</span><span id="ws-status-dot" class="status-dot offline"></span><span id="ws-status-text" class="text-slate-400">未连接</span></div>
            <div class="flex items-center gap-2"><span>手机:</span><span id="mobile-status-dot" class="status-dot offline"></span><span id="mobile-status-text" class="text-slate-400">离线</span></div>
            <span class="text-slate-500 mono text-xs" id="clock">--:--:--</span>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden">
        <!-- 左侧面板 -->
        <aside class="w-80 bg-white border-r border-slate-200 flex flex-col shadow-sm z-10 overflow-y-auto no-scrollbar">
            <div class="p-5 border-b border-slate-100">
                <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">当前运动状态</h2>
                <div class="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-2xl p-5 text-white shadow-lg relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full -mr-10 -mt-10 blur-2xl"></div>
                    <div class="relative z-10">
                        <div class="text-5xl mb-2" id="activity-icon">❓</div>
                        <div class="text-3xl font-bold mb-1" id="activity-text">等待数据...</div>
                        <div class="flex items-center gap-2 text-blue-100 text-sm"><span>置信度:</span><span class="font-bold text-white" id="confidence">--</span><span>%</span></div>
                        <div class="mt-2 inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-white/20 text-xs" id="mode-badge"><span class="w-1.5 h-1.5 rounded-full bg-white/60"></span><span>--</span></div>
                    </div>
                </div>
            </div>

            <div class="p-5 border-b border-slate-100">
                <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">实时参数</h2>
                <div class="space-y-2.5">
                    <div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl"><span class="text-slate-600 text-sm">加速度幅值</span><span class="mono font-bold text-slate-800 text-sm" id="acc-mag">0.00</span></div>
                    <div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl"><span class="text-slate-600 text-sm">陀螺仪幅值</span><span class="mono font-bold text-slate-800 text-sm" id="gyro-mag">0.00</span></div>
                    <div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl"><span class="text-slate-600 text-sm">GPS 纬度</span><span class="mono text-xs text-slate-600" id="gps-lat">--</span></div>
                    <div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl"><span class="text-slate-600 text-sm">GPS 经度</span><span class="mono text-xs text-slate-600" id="gps-lng">--</span></div>
                </div>
            </div>

            <div class="p-5 border-b border-slate-100">
                <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">传感器原始值</h2>
                <div class="text-xs mono bg-slate-900 text-green-400 p-4 rounded-xl space-y-1.5 leading-relaxed">
                    <div>Acc: <span id="raw-acc">[0.00, 0.00, 0.00]</span></div>
                    <div>Gyro: <span id="raw-gyro">[0.00, 0.00, 0.00]</span></div>
                </div>
            </div>

            <div class="p-5 flex-1">
                <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">连接调试</h2>
                <div class="text-[11px] mono bg-slate-50 text-slate-600 p-3 rounded-xl space-y-1" id="debug-info">
                    <div>WS URL: <span id="debug-ws-url" class="text-blue-600">--</span></div>
                    <div>状态: <span id="debug-state">未初始化</span></div>
                    <div>接收包数: <span id="debug-packets">0</span></div>
                    <div>最后接收: <span id="debug-last">--</span></div>
                </div>
            </div>

            <div class="p-4 bg-slate-50 border-t border-slate-200">
                <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">系统日志</h2>
                <div id="log-container" class="h-28 overflow-y-auto text-[11px] mono space-y-1 text-slate-500 no-scrollbar"><div class="text-slate-400 italic">等待连接...</div></div>
            </div>
        </aside>

        <!-- 右侧主区域 -->
        <main class="flex-1 flex flex-col bg-slate-100">
            <!-- 地图 / 相对轨迹区域 -->
            <div class="flex-1 relative" id="map-container">
                <div id="map"></div>
                <canvas id="rel-canvas"></canvas>
                <!-- 轨迹模式切换 -->
                <div class="absolute top-4 right-4 flex items-center gap-2 z-10">
                    <div class="glass rounded-xl shadow flex overflow-hidden">
                        <button id="btn-map-mode" class="px-3 py-1.5 text-sm font-medium btn-active" onclick="switchTrajectoryMode('map')">高德地图</button>
                        <button id="btn-rel-mode" class="px-3 py-1.5 text-sm font-medium text-slate-600 bg-white" onclick="switchTrajectoryMode('relative')">相对轨迹</button>
                    </div>
                    <div class="glass px-4 py-2 rounded-xl shadow text-sm text-slate-700 flex items-center gap-2">
                        <span>轨迹点数:</span>
                        <span id="track-count" class="font-bold text-blue-600 text-lg">0</span>
                    </div>
                </div>
                <!-- 步长调节 -->
                <div id="step-ctrl" class="absolute bottom-4 left-4 glass px-3 py-1.5 rounded-xl shadow text-xs text-slate-600 hidden items-center gap-2 z-10">
                    <span>步长:</span>
                    <input id="step-length" type="range" min="0.3" max="1.5" step="0.05" value="0.7" oninput="document.getElementById('step-val').textContent=this.value;redrawRelTrajectory()" class="w-20">
                    <span id="step-val" class="font-bold">0.7</span><span>m</span>
                </div>
            </div>

            <!-- 底部图表 -->
            <div class="h-64 bg-white border-t border-slate-200 p-4">
                <div id="chart" class="w-full h-full"></div>
            </div>
        </main>
    </div>

    <!-- 分析结果弹窗 -->
    <div id="chart-modal" class="fixed inset-0 bg-black/50 z-50 hidden flex items-center justify-center" onclick="if(event.target===this)closeChartModal()">
        <div class="modal-enter bg-white rounded-2xl shadow-2xl flex flex-col" style="width:92vw;height:88vh;max-width:1400px;">
            <div class="flex justify-between items-center p-4 border-b border-slate-200 flex-shrink-0">
                <h3 class="text-lg font-bold flex items-center gap-2">
                    <span>📊 采集数据回顾</span>
                    <span id="popup-activity" class="px-3 py-0.5 rounded-full text-sm text-white bg-blue-600">--</span>
                </h3>
                <div class="flex gap-2">
                    <button onclick="saveSessionCharts()" class="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700">💾 保存截图</button>
                    <button onclick="exportSessionCSV()" class="px-4 py-2 bg-green-600 text-white rounded-lg text-sm font-medium hover:bg-green-700">📥 导出 CSV</button>
                    <button onclick="closeChartModal()" class="px-4 py-2 bg-slate-200 rounded-lg text-sm font-medium hover:bg-slate-300">✕ 关闭</button>
                </div>
            </div>
            <div class="flex-1 p-4 flex flex-col gap-3 overflow-hidden">
                <div class="text-xs text-slate-500 flex gap-4 mb-1"><span id="popup-info"></span></div>
                <div id="popup-chart-acc" class="flex-1 min-h-0"></div>
                <div id="popup-chart-gyro" class="flex-1 min-h-0"></div>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // 常量
        // ==========================================
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const host = window.location.host || 'localhost:8000';
        const WS_URL = `${protocol}//${host}/ws/client`;
        const ACTIVITY_ICONS = { "走路":"🚶","跑步":"🏃","跳跃":"⬆️","高抬腿":"🦵","等待数据...":"❓","采集中...":"📡","不确定":"🤔","数据不足":"⛔" };
        const ACTIVITY_COLORS = { "走路":"#3b82f6","跑步":"#f59e0b","跳跃":"#ef4444","高抬腿":"#8b5cf6" };
        document.getElementById('debug-ws-url').textContent = WS_URL;

        // ==========================================
        // 地图
        // ==========================================
        let map=null, path=[], polyline=null, currentMarker=null;
        try {
            map = new AMap.Map('map',{zoom:16,center:[116.397428,39.90923]});
            polyline = new AMap.Polyline({path:[],strokeColor:"#3b82f6",strokeWeight:4,strokeOpacity:0.8});
            polyline.setMap(map);
        } catch(e){ console.warn('高德地图不可用:',e); }

        // ==========================================
        // 相对轨迹  (修复版)
        // ==========================================
        let trajectoryMode = 'map';
        let relTrajectory = [];                   // [{x, y}]  全局轨迹点
        let relCanvas = document.getElementById('rel-canvas');
        let relCtx = relCanvas.getContext('2d');

        /** 每收到一帧就实时更新轨迹 (逐帧积算航向, 波峰触发步数) */
        function appendRelTrajectory(accX, accY, accZ, gyroX, gyroY, gyroZ) {
            // 维护跨帧状态 (闭包变量)
            if (!appendRelTrajectory._buffer) {
                appendRelTrajectory._buffer = [];
                appendRelTrajectory._heading = 0;        // 累计航向 (弧度)
                appendRelTrajectory._prevHeading = 0;
                appendRelTrajectory._lastStepFrame = 0;
                appendRelTrajectory._stepAccMag = [];     // 近 N 帧合加速度 (用于统计阈值)
            }
            const st = appendRelTrajectory._buffer;
            const DT = 0.02;  // 50 Hz

            // ---- 1. 航向累积 (每帧都积, 度→弧度) ----
            // rotationRate.alpha 是绕 Z 轴旋转角速度 (°/s)
            appendRelTrajectory._heading += (gyroZ || 0) * DT * (Math.PI / 180.0);

            // ---- 2. 合加速度 ----
            const accMag = Math.sqrt(accX*accX + accY*accY + accZ*accZ);
            st.push(accMag);
            if (st.length > 200) st.shift();   // 保留近 4 秒

            appendRelTrajectory._lastStepFrame++;

            // ---- 3. 自适应步数检测 ----
            if (st.length < 20) return;  // 等缓冲区攒够

            // 自适应阈值: 取均值 + 0.6 倍标准差, 并限制在 [1.5, 6.0]
            const meanMag = st.reduce((a,b)=>a+b,0)/st.length;
            const stdMag  = Math.sqrt(st.reduce((s,v)=>s+(v-meanMag)**2,0)/st.length);
            const threshold = Math.min(6.0, Math.max(1.5, meanMag + 0.6 * stdMag));

            // 波峰检测 (宽 3 点) + 最小步间隔 15 帧 (0.3 s)
            const i = st.length - 1;
            if (i >= 2 && st[i-1] > threshold &&
                st[i-1] > st[i-2] && st[i-1] > st[i] &&
                appendRelTrajectory._lastStepFrame > 15)
            {
                appendRelTrajectory._lastStepFrame = 0;

                const sl = parseFloat(document.getElementById('step-length').value) || 0.7;
                const heading = appendRelTrajectory._heading;

                if (relTrajectory.length === 0) {
                    relTrajectory.push({x:0, y:0});
                }
                const lp = relTrajectory[relTrajectory.length - 1];
                relTrajectory.push({
                    x: lp.x + sl * Math.cos(heading),
                    y: lp.y + sl * Math.sin(heading)
                });

                // 实时刷新画布
                if (trajectoryMode === 'relative') {
                    redrawRelTrajectory();
                }
                document.getElementById('track-count').textContent = relTrajectory.length - 1;
            }
        }

        /** 切换模式 */
        function switchTrajectoryMode(mode) {
            trajectoryMode = mode;
            const btnMap = document.getElementById('btn-map-mode');
            const btnRel = document.getElementById('btn-rel-mode');
            const stepCtrl = document.getElementById('step-ctrl');
            if (mode === 'map') {
                btnMap.className = 'px-3 py-1.5 text-sm font-medium btn-active';
                btnRel.className = 'px-3 py-1.5 text-sm font-medium text-slate-600 bg-white';
                document.getElementById('map').style.display = '';
                relCanvas.style.display = 'none';
                stepCtrl.classList.add('hidden');
                document.getElementById('track-count').textContent = path.length;
            } else {
                btnRel.className = 'px-3 py-1.5 text-sm font-medium btn-active';
                btnMap.className = 'px-3 py-1.5 text-sm font-medium text-slate-600 bg-white';
                document.getElementById('map').style.display = 'none';
                relCanvas.style.display = '';
                stepCtrl.classList.remove('hidden');
                // 切回来时要重画 (canvas 尺寸可能因 display:none 而丢失)
                resizeRelCanvas();
                redrawRelTrajectory();
                document.getElementById('track-count').textContent = relTrajectory.length > 0 ? relTrajectory.length - 1 : 0;
            }
        }

        function resizeRelCanvas() {
            const parent = relCanvas.parentElement;
            relCanvas.width  = parent.clientWidth  || 800;
            relCanvas.height = parent.clientHeight || 500;
        }

        function redrawRelTrajectory() {
            resizeRelCanvas();
            const c = relCanvas, ctx = relCtx;
            const pts = relTrajectory;
            ctx.clearRect(0, 0, c.width, c.height);

            // 背景
            ctx.fillStyle = '#f8fafc'; ctx.fillRect(0, 0, c.width, c.height);

            // 网格
            ctx.strokeStyle = '#e2e8f0'; ctx.lineWidth = 0.5;
            for (let gx = 0; gx < c.width;  gx += 50) { ctx.beginPath(); ctx.moveTo(gx, 0); ctx.lineTo(gx, c.height); ctx.stroke(); }
            for (let gy = 0; gy < c.height; gy += 50) { ctx.beginPath(); ctx.moveTo(0, gy); ctx.lineTo(c.width, gy);  ctx.stroke(); }

            if (pts.length < 2) {
                ctx.fillStyle = '#94a3b8'; ctx.font = '18px sans-serif';
                ctx.textAlign = 'center';
                ctx.fillText('暂无轨迹数据，请在采集时切换到相对轨迹模式', c.width/2, c.height/2);
                return;
            }

            const allX = pts.map(p=>p.x), allY = pts.map(p=>p.y);
            const xMin = Math.min(...allX), xMax = Math.max(...allX);
            const yMin = Math.min(...allY), yMax = Math.max(...allY);
            const rangeX = (xMax - xMin) || 1, rangeY = (yMax - yMin) || 1;
            const pad = 50;
            const scale = Math.min((c.width  - 2*pad) / rangeX, (c.height - 2*pad) / rangeY);
            const cx = (xMax + xMin) / 2, cy = (yMax + yMin) / 2;
            const tx = (px) => (px - cx) * scale + c.width/2;
            const ty = (py) => (cy - py) * scale + c.height/2;  // Y 轴翻转

            // 折线
            ctx.strokeStyle = '#3b82f6'; ctx.lineWidth = 2.5; ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            ctx.beginPath(); ctx.moveTo(tx(pts[0].x), ty(pts[0].y));
            for (let i = 1; i < pts.length; i++) ctx.lineTo(tx(pts[i].x), ty(pts[i].y));
            ctx.stroke();

            // 起点 (绿)
            ctx.fillStyle = '#22c55e'; ctx.beginPath(); ctx.arc(tx(pts[0].x), ty(pts[0].y), 6, 0, 2*Math.PI); ctx.fill();
            // 终点 (红)
            if (pts.length > 1) {
                ctx.fillStyle = '#ef4444'; ctx.beginPath();
                ctx.arc(tx(pts[pts.length-1].x), ty(pts[pts.length-1].y), 7, 0, 2*Math.PI); ctx.fill();
            }
            // 图例
            ctx.fillStyle = '#475569'; ctx.font = '13px sans-serif'; ctx.textAlign = 'left';
            ctx.fillText('🟢 起点', 10, 22);
            ctx.fillText('🔴 终点', 10, 42);
            ctx.fillText(`共 ${pts.length - 1} 步`, 10, 62);
            // 比例尺
            const barLen = 1.0; // 1 米
            const barX1 = c.width - 80, barY = c.height - 20;
            ctx.strokeStyle = '#1e293b'; ctx.lineWidth = 2;
            ctx.beginPath(); ctx.moveTo(barX1, barY); ctx.lineTo(barX1 + barLen * scale, barY); ctx.stroke();
            ctx.fillStyle = '#1e293b'; ctx.font = '11px sans-serif';
            ctx.fillText('1 m', barX1, barY - 5);
        }

        // ==========================================
        // 实时图表 (ECharts, 底部)
        // ==========================================
        const chart = echarts.init(document.getElementById('chart'));
        const maxPoints = 200;
        let accData={x:[],y:[],z:[]}, gyroData={x:[],y:[],z:[]}, timeLabels=[];
        chart.setOption({animation:false,
            grid:[{left:50,right:20,top:30,bottom:20,height:'35%'},{left:50,right:20,top:'55%',bottom:20,height:'35%'}],
            legend:{data:['Acc X','Acc Y','Acc Z','Gyro X','Gyro Y','Gyro Z'],top:0,textStyle:{fontSize:11}},
            xAxis:[{type:'category',gridIndex:0,data:[],axisLabel:{show:false}},{type:'category',gridIndex:1,data:[],axisLabel:{show:false}}],
            yAxis:[{type:'value',gridIndex:0,name:'加速度(m/s²)',nameTextStyle:{fontSize:10},axisLabel:{fontSize:10}},{type:'value',gridIndex:1,name:'角速度(rad/s)',nameTextStyle:{fontSize:10},axisLabel:{fontSize:10}}],
            series:[
                {name:'Acc X',type:'line',xAxisIndex:0,yAxisIndex:0,data:[],showSymbol:false,lineStyle:{width:1.5,color:'#ef4444'}},
                {name:'Acc Y',type:'line',xAxisIndex:0,yAxisIndex:0,data:[],showSymbol:false,lineStyle:{width:1.5,color:'#22c55e'}},
                {name:'Acc Z',type:'line',xAxisIndex:0,yAxisIndex:0,data:[],showSymbol:false,lineStyle:{width:1.5,color:'#3b82f6'}},
                {name:'Gyro X',type:'line',xAxisIndex:1,yAxisIndex:1,data:[],showSymbol:false,lineStyle:{width:1.5,color:'#f97316'}},
                {name:'Gyro Y',type:'line',xAxisIndex:1,yAxisIndex:1,data:[],showSymbol:false,lineStyle:{width:1.5,color:'#eab308'}},
                {name:'Gyro Z',type:'line',xAxisIndex:1,yAxisIndex:1,data:[],showSymbol:false,lineStyle:{width:1.5,color:'#06b6d4'}},
        ]});

        // ==========================================
        // Session 全量数据存储
        // ==========================================
        let sessionAcc={x:[],y:[],z:[]}, sessionGyro={x:[],y:[],z:[]}, sessionTimes=[];

        // ==========================================
        // WebSocket
        // ==========================================
        let ws=null, lastMobileTime=0, packetCount=0, reconnectTimer=null, collecting=false;

        function connect() {
            if (ws&&(ws.readyState===WebSocket.CONNECTING||ws.readyState===WebSocket.OPEN)) return;
            log(`🔗 正在连接: ${WS_URL}`);
            document.getElementById('debug-state').textContent='连接中...';
            try { ws=new WebSocket(WS_URL); } catch(e){ log('❌ 创建失败: '+e.message); document.getElementById('debug-state').textContent='创建失败'; scheduleReconnect(); return; }
            ws.onopen=()=>{updateBackendStatus(true);log('✅ 已连接');document.getElementById('debug-state').textContent='已连接';if(reconnectTimer){clearTimeout(reconnectTimer);reconnectTimer=null;}};
            ws.onmessage=(event)=>{try{handleData(JSON.parse(event.data));}catch(e){log('⚠️ 解析失败');}};
            ws.onclose=(event)=>{updateBackendStatus(false);updateMobileStatus(false);log(`❌ 断开 (code:${event.code})`);document.getElementById('debug-state').textContent=`断开(${event.code})`;scheduleReconnect();};
            ws.onerror=()=>{log('⚠️ WebSocket 错误');document.getElementById('debug-state').textContent='错误';};
        }
        function scheduleReconnect() { if(reconnectTimer) return; log('⏳ 3秒后重连...'); reconnectTimer=setTimeout(()=>{reconnectTimer=null;connect();},3000); }

        // ==========================================
        // 状态更新
        // ==========================================
        function updateBackendStatus(ok){
            const d=document.getElementById('ws-status-dot'),t=document.getElementById('ws-status-text');
            d.className='status-dot '+(ok?'online':'offline'); t.textContent=ok?'已连接':'未连接';
            if(!ok) t.className='text-slate-400'; else t.className='';
        }
        function updateMobileStatus(online){
            const d=document.getElementById('mobile-status-dot'),t=document.getElementById('mobile-status-text');
            d.className='status-dot '+(online?'online':'offline'); t.textContent=online?'在线':'离线';
            if(!online) t.className='text-slate-400'; else t.className='';
        }

        function resetSessionData() {
            path=[]; if(polyline) polyline.setPath(path);
            if(currentMarker){map.remove(currentMarker);currentMarker=null;}
            document.getElementById('track-count').textContent=0;
            timeLabels=[]; accData={x:[],y:[],z:[]}; gyroData={x:[],y:[],z:[]};
            chart.setOption({xAxis:[{data:[]},{data:[]}],series:[{data:[]},{data:[]},{data:[]},{data:[]},{data:[]},{data:[]}]});
            sessionAcc={x:[],y:[],z:[]}; sessionGyro={x:[],y:[],z:[]}; sessionTimes=[];
            // 重置相对轨迹
            relTrajectory = [];
            appendRelTrajectory._buffer = undefined;
            appendRelTrajectory._heading = 0;
            appendRelTrajectory._lastStepFrame = 0;
            if (trajectoryMode === 'relative') redrawRelTrajectory();
        }

        // ==========================================
        // 数据处理
        // ==========================================
        function handleData(data) {
            if (data.event === "session_start") {
                collecting=true; resetSessionData(); updateMobileStatus(true); lastMobileTime=Date.now();
                document.getElementById('activity-text').textContent='采集中...';
                document.getElementById('activity-icon').textContent='📡';
                document.getElementById('confidence').textContent='--';
                document.getElementById('mode-badge').innerHTML='<span class="w-1.5 h-1.5 rounded-full bg-yellow-300"></span><span>采集中</span>';
                log('📡 开始采集');
                return;
            }
            if (data.event === "session_result") {
                collecting=false;
                const activity=data.activity||"未知";
                document.getElementById('activity-text').textContent=activity;
                document.getElementById('activity-icon').textContent=ACTIVITY_ICONS[activity]||"❓";
                document.getElementById('confidence').textContent=((data.confidence||0)*100).toFixed(1);
                const badge=document.getElementById('mode-badge');
                if(activity==="数据不足"){badge.innerHTML='<span class="w-1.5 h-1.5 rounded-full bg-red-400"></span><span>数据不足</span>';log('⚠️ '+(data.message||'数据不足'));}
                else{const mode=data.mode||"fusion";badge.innerHTML=`<span class="w-1.5 h-1.5 rounded-full bg-blue-300"></span><span>${mode}</span>`;
                    let d=`✅ 判定: ${activity} | 融合 ${((data.confidence||0)*100).toFixed(1)}%`;
                    if(data.acc_pred) d+=` | 加速度→${data.acc_pred}(${((data.acc_conf||0)*100).toFixed(0)}%)`;
                    if(data.gyro_pred) d+=` | 陀螺仪→${data.gyro_pred}(${((data.gyro_conf||0)*100).toFixed(0)}%)`;
                    d+=` | ${data.duration_sec||0}s / ${data.sample_count||0}帧`; log(d);}
                // 确保最后轨迹完整
                if(trajectoryMode==='relative'){redrawRelTrajectory();document.getElementById('track-count').textContent=relTrajectory.length>0?relTrajectory.length-1:0;}
                openChartModal(activity, data);
                return;
            }

            // —— 实时数据包 ——
            updateMobileStatus(true); lastMobileTime=Date.now();
            setTimeout(()=>{if(Date.now()-lastMobileTime>3000)updateMobileStatus(false);},3500);

            document.getElementById('clock').textContent = data.server_time ? data.server_time.split('T')[1].split('.')[0] : '--:--:--';

            if (!collecting) {
                document.getElementById('activity-text').textContent='等待数据...';
                document.getElementById('activity-icon').textContent='❓';
                document.getElementById('confidence').textContent='--';
                document.getElementById('mode-badge').innerHTML='<span class="w-1.5 h-1.5 rounded-full bg-slate-300"></span><span>待机</span>';
            }

            const acc=data.acc||[0,0,0], gyro=data.gyro||[0,0,0];
            document.getElementById('acc-mag').textContent=Math.sqrt(acc[0]**2+acc[1]**2+acc[2]**2).toFixed(2);
            document.getElementById('gyro-mag').textContent=Math.sqrt(gyro[0]**2+gyro[1]**2+gyro[2]**2).toFixed(2);
            document.getElementById('raw-acc').textContent=`[${acc.map(v=>v.toFixed(2)).join(', ')}]`;
            document.getElementById('raw-gyro').textContent=`[${gyro.map(v=>v.toFixed(2)).join(', ')}]`;

            const gps=data.gps||{};
            document.getElementById('gps-lat').textContent=gps.lat?gps.lat.toFixed(6):'--';
            document.getElementById('gps-lng').textContent=gps.lng?gps.lng.toFixed(6):'--';

            if(gps.lat&&gps.lng&&map&&trajectoryMode==='map'){
                const pos=[gps.lng,gps.lat]; path.push(pos); polyline.setPath(path); map.setCenter(pos);
                if(currentMarker)map.remove(currentMarker);
                currentMarker=new AMap.Marker({position:pos,offset:new AMap.Pixel(-8,-8)}); currentMarker.setMap(map);
                document.getElementById('track-count').textContent=path.length;
            }

            packetCount++;
            document.getElementById('debug-packets').textContent=packetCount;
            document.getElementById('debug-last').textContent=new Date().toLocaleTimeString();

            if(collecting){
                sessionAcc.x.push(acc[0]);sessionAcc.y.push(acc[1]);sessionAcc.z.push(acc[2]);
                sessionGyro.x.push(gyro[0]);sessionGyro.y.push(gyro[1]);sessionGyro.z.push(gyro[2]);
                sessionTimes.push(new Date().toLocaleTimeString('zh-CN',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'}));

                // ★ 逐帧更新相对轨迹
                appendRelTrajectory(acc[0], acc[1], acc[2], gyro[0], gyro[1], gyro[2]);
            }
            updateLiveChart(acc,gyro);
        }

        function updateLiveChart(acc,gyro){
            timeLabels.push(new Date().toLocaleTimeString('zh-CN',{hour12:false,hour:'2-digit',minute:'2-digit',second:'2-digit'}));
            accData.x.push(acc[0]);accData.y.push(acc[1]);accData.z.push(acc[2]);
            gyroData.x.push(gyro[0]);gyroData.y.push(gyro[1]);gyroData.z.push(gyro[2]);
            if(timeLabels.length>maxPoints){timeLabels.shift();accData.x.shift();accData.y.shift();accData.z.shift();gyroData.x.shift();gyroData.y.shift();gyroData.z.shift();}
            chart.setOption({xAxis:[{data:timeLabels},{data:timeLabels}],series:[{data:accData.x},{data:accData.y},{data:accData.z},{data:gyroData.x},{data:gyroData.y},{data:gyroData.z}]});
        }

        // ==========================================
        // 分析结果弹窗
        // ==========================================
        let popupAccChart=null, popupGyroChart=null;
        function openChartModal(activity, resultData) {
            document.getElementById('chart-modal').classList.remove('hidden');
            document.getElementById('popup-activity').textContent = activity;
            const cls = ACTIVITY_COLORS[activity] || '#64748b';
            document.getElementById('popup-activity').style.background = cls;
            document.getElementById('popup-info').textContent =
                `时长: ${resultData.duration_sec||'?'}s | 帧数: ${resultData.sample_count||'?'} | `+
                `加速计→${resultData.acc_pred||'--'}(${((resultData.acc_conf||0)*100).toFixed(0)}%) | `+
                `陀螺仪→${resultData.gyro_pred||'--'}(${((resultData.gyro_conf||0)*100).toFixed(0)}%)`;

            const samples = Math.min(sessionTimes.length, 2000);
            const step = Math.max(1, Math.floor(sessionTimes.length / samples));
            const t=[],ax=[],ay=[],az=[],gx=[],gy=[],gz=[];
            for(let i=0;i<sessionTimes.length;i+=step){t.push(sessionTimes[i]);ax.push(sessionAcc.x[i]);ay.push(sessionAcc.y[i]);az.push(sessionAcc.z[i]);gx.push(sessionGyro.x[i]);gy.push(sessionGyro.y[i]);gz.push(sessionGyro.z[i]);}

            const mkChart=(domId,yName,seriesArr)=>{
                const dom=document.getElementById(domId);
                if(dom._echart_) dom._echart_.dispose();
                const ec=echarts.init(dom); dom._echart_=ec;
                ec.setOption({
                    animation:false, toolbox:{feature:{saveAsImage:{title:'保存'},dataZoom:{title:{zoom:'缩放',back:'还原'}},restore:{title:'还原'}}},
                    tooltip:{trigger:'axis'}, legend:{data:seriesArr.map(s=>s.name),top:0,textStyle:{fontSize:11}},
                    grid:{left:50,right:20,top:35,bottom:30},
                    xAxis:{type:'category',data:t,axisLabel:{fontSize:10,rotate:30,interval:Math.floor(t.length/15)}},
                    yAxis:{type:'value',name:yName,nameTextStyle:{fontSize:10},axisLabel:{fontSize:10}},
                    dataZoom:[{type:'inside',start:0,end:100},{type:'slider',start:0,end:100,height:18,bottom:5}],
                    series:seriesArr.map(s=>({...s,type:'line',showSymbol:false,lineStyle:{width:1.5}}))
                });
                return ec;
            };
            popupAccChart = mkChart('popup-chart-acc','加速度 (m/s²)',
                [{name:'Acc X',data:ax,lineStyle:{color:'#ef4444'}},{name:'Acc Y',data:ay,lineStyle:{color:'#22c55e'}},{name:'Acc Z',data:az,lineStyle:{color:'#3b82f6'}}]);
            popupGyroChart = mkChart('popup-chart-gyro','角速度 (rad/s)',
                [{name:'Gyro X',data:gx,lineStyle:{color:'#f97316'}},{name:'Gyro Y',data:gy,lineStyle:{color:'#eab308'}},{name:'Gyro Z',data:gz,lineStyle:{color:'#06b6d4'}}]);
        }

        function closeChartModal() {
            document.getElementById('chart-modal').classList.add('hidden');
            if(popupAccChart){popupAccChart.dispose();popupAccChart=null;}
            if(popupGyroChart){popupGyroChart.dispose();popupGyroChart=null;}
        }

        function saveSessionCharts() {
            if(!popupAccChart||!popupGyroChart) return;
            const ua=popupAccChart.getDataURL({type:'png',pixelRatio:2,backgroundColor:'#fff'});
            const ug=popupGyroChart.getDataURL({type:'png',pixelRatio:2,backgroundColor:'#fff'});
            const imgA=new Image(); imgA.src=ua;
            imgA.onload=()=>{
                const imgG=new Image(); imgG.src=ug;
                imgG.onload=()=>{
                    const w=Math.max(imgA.width,imgG.width), h=imgA.height+imgG.height;
                    const c=document.createElement('canvas'); c.width=w; c.height=h;
                    const ctx=c.getContext('2d'); ctx.fillStyle='#fff'; ctx.fillRect(0,0,w,h);
                    ctx.drawImage(imgA,0,0); ctx.drawImage(imgG,0,imgA.height);
                    const a=document.createElement('a'); a.download=`步态分析_${new Date().toISOString().slice(0,10)}.png`;
                    a.href=c.toDataURL('image/png'); a.click();
                    log('💾 截图已保存');
                };
            };
        }

        function exportSessionCSV() {
            let csv = '时间,Acc_X,Acc_Y,Acc_Z,Gyro_X,Gyro_Y,Gyro_Z\n';
            for(let i=0;i<sessionTimes.length;i++){
                csv+=`${sessionTimes[i]},${sessionAcc.x[i]},${sessionAcc.y[i]},${sessionAcc.z[i]},${sessionGyro.x[i]},${sessionGyro.y[i]},${sessionGyro.z[i]}\n`;
            }
            const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8;'});
            const a=document.createElement('a'); a.download=`步态数据_${new Date().toISOString().slice(0,10)}.csv`;
            a.href=URL.createObjectURL(blob); a.click(); URL.revokeObjectURL(a.href);
            log('📥 CSV 已导出');
        }

        // ==========================================
        // 日志
        // ==========================================
        function log(msg){
            const c=document.getElementById('log-container');
            const d=document.createElement('div');
            d.innerHTML=`<span class="text-slate-400">[${new Date().toLocaleTimeString('zh-CN',{hour12:false})}]</span> ${msg}`;
            c.appendChild(d); c.scrollTop=c.scrollHeight;
            while(c.children.length>30) c.removeChild(c.firstChild);
        }

        // ==========================================
        // 启动
        // ==========================================
        window.addEventListener('load',()=>{
            log('📊 监控端已加载'); log(`🌐 ${WS_URL}`); connect();
            resizeRelCanvas();  // 预置 canvas 尺寸
        });
        window.addEventListener('resize',()=>{
            chart.resize();
            if(popupAccChart){popupAccChart.resize();popupGyroChart.resize();}
            if(trajectoryMode==='relative') redrawRelTrajectory();
        });
    </script>
</body>
</html>
