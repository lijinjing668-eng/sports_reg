<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>步态实时监测系统 - 监控端</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <script src="https://webapi.amap.com/maps?v=2.0&key=b89336ecafc28315501f354a9024f29d"></script>
    <style>
        * { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif; }
        body { background: #f1f5f9; }
        .status-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; transition: all 0.3s; }
        .online { background: #22c55e; box-shadow: 0 0 10px #22c55e; }
        .offline { background: #ef4444; }
        .glass { background: rgba(255,255,255,0.95); backdrop-filter: blur(10px); border: 1px solid rgba(226,232,240,0.8); }
        .card-hover { transition: transform 0.2s, box-shadow 0.2s; }
        .card-hover:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(0,0,0,0.08); }
        .mono { font-family: 'SF Mono', Monaco, 'Cascadia Code', monospace; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 1; }
            100% { transform: scale(2.2); opacity: 0; }
        }
        .pulse-ring::before {
            content: ''; position: absolute; width: 100%; height: 100%; border-radius: 50%;
            background: inherit; animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
        #map-fallback { display: none; }
    </style>
<base target="_blank">
</head>
<body class="h-screen overflow-hidden flex flex-col">

    <!-- 顶部栏 -->
    <header class="bg-slate-900 text-white px-6 py-3 flex justify-between items-center shadow-lg z-20">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 rounded-lg bg-blue-500/20 flex items-center justify-center text-xl">🏃</div>
            <h1 class="text-lg font-bold tracking-wide">步态实时监测系统</h1>
        </div>
        <div class="flex items-center gap-6 text-sm">
            <div class="flex items-center gap-2">
                <span>后端:</span>
                <span id="ws-status-dot" class="status-dot offline"></span>
                <span id="ws-status-text" class="text-slate-400">未连接</span>
            </div>
            <div class="flex items-center gap-2">
                <span>手机:</span>
                <span id="mobile-status-dot" class="status-dot offline"></span>
                <span id="mobile-status-text" class="text-slate-400">离线</span>
            </div>
            <span class="text-slate-500 mono text-xs" id="clock">--:--:--</span>
        </div>
    </header>

    <div class="flex-1 flex overflow-hidden">
        <!-- 左侧面板 -->
        <aside class="w-80 bg-white border-r border-slate-200 flex flex-col shadow-sm z-10 overflow-y-auto no-scrollbar">

            <!-- 运动状态卡片 -->
            <div class="p-5 border-b border-slate-100">
                <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">当前运动状态</h2>
                <div class="bg-gradient-to-br from-blue-600 to-indigo-700 rounded-2xl p-5 text-white shadow-lg card-hover relative overflow-hidden">
                    <div class="absolute top-0 right-0 w-32 h-32 bg-white/10 rounded-full -mr-10 -mt-10 blur-2xl"></div>
                    <div class="relative z-10">
                        <div class="text-5xl mb-2" id="activity-icon">❓</div>
                        <div class="text-3xl font-bold mb-1" id="activity-text">等待数据...</div>
                        <div class="flex items-center gap-2 text-blue-100 text-sm">
                            <span>置信度:</span>
                            <span class="font-bold text-white" id="confidence">--</span>
                            <span>%</span>
                        </div>
                        <div class="mt-2 inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full bg-white/20 text-xs" id="mode-badge">
                            <span class="w-1.5 h-1.5 rounded-full bg-white/60"></span>
                            <span>--</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- 实时参数 -->
            <div class="p-5 border-b border-slate-100">
                <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">实时参数</h2>
                <div class="space-y-2.5">
                    <div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl">
                        <span class="text-slate-600 text-sm">加速度幅值</span>
                        <span class="mono font-bold text-slate-800 text-sm" id="acc-mag">0.00</span>
                    </div>
                    <div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl">
                        <span class="text-slate-600 text-sm">陀螺仪幅值</span>
                        <span class="mono font-bold text-slate-800 text-sm" id="gyro-mag">0.00</span>
                    </div>
                    <div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl">
                        <span class="text-slate-600 text-sm">GPS 纬度</span>
                        <span class="mono text-xs text-slate-600" id="gps-lat">--</span>
                    </div>
                    <div class="flex justify-between items-center p-3 bg-slate-50 rounded-xl">
                        <span class="text-slate-600 text-sm">GPS 经度</span>
                        <span class="mono text-xs text-slate-600" id="gps-lng">--</span>
                    </div>
                </div>
            </div>

            <!-- 原始数据 -->
            <div class="p-5 border-b border-slate-100">
                <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">传感器原始值</h2>
                <div class="text-xs mono bg-slate-900 text-green-400 p-4 rounded-xl space-y-1.5 leading-relaxed">
                    <div>Acc: <span id="raw-acc">[0.00, 0.00, 0.00]</span></div>
                    <div>Gyro: <span id="raw-gyro">[0.00, 0.00, 0.00]</span></div>
                </div>
            </div>

            <!-- 调试信息 -->
            <div class="p-5 flex-1">
                <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-3">连接调试</h2>
                <div class="text-[11px] mono bg-slate-50 text-slate-600 p-3 rounded-xl space-y-1" id="debug-info">
                    <div>WS URL: <span id="debug-ws-url" class="text-blue-600">--</span></div>
                    <div>状态: <span id="debug-state">未初始化</span></div>
                    <div>接收包数: <span id="debug-packets">0</span></div>
                    <div>最后接收: <span id="debug-last">--</span></div>
                </div>
            </div>

            <!-- 日志 -->
            <div class="p-4 bg-slate-50 border-t border-slate-200">
                <h2 class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">系统日志</h2>
                <div id="log-container" class="h-28 overflow-y-auto text-[11px] mono space-y-1 text-slate-500 no-scrollbar">
                    <div class="text-slate-400 italic">等待连接...</div>
                </div>
            </div>
        </aside>

        <!-- 右侧主区域 -->
        <main class="flex-1 flex flex-col bg-slate-100">
            <!-- 地图区域 -->
            <div class="flex-1 relative">
                <div id="map" class="w-full h-full"></div>
                <div id="map-fallback" class="w-full h-full flex items-center justify-center bg-slate-200">
                    <div class="text-center text-slate-500">
                        <div class="text-4xl mb-2">🗺️</div>
                        <div class="text-sm">地图加载中...</div>
                        <div class="text-xs mt-1 text-slate-400">若长时间未显示，请检查高德地图 API Key</div>
                    </div>
                </div>
                <div class="absolute top-4 right-4 glass px-4 py-2 rounded-xl shadow text-sm text-slate-700 flex items-center gap-2">
                    <span>轨迹点数:</span>
                    <span id="track-count" class="font-bold text-blue-600 text-lg">0</span>
                </div>
            </div>

            <!-- 底部图表 -->
            <div class="h-64 bg-white border-t border-slate-200 p-4">
                <div id="chart" class="w-full h-full"></div>
            </div>
        </main>
    </div>

    <script>
        // ==========================================
        // 配置与常量
        // ==========================================
        const protocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
        const host = window.location.host || 'localhost:8000';
        const WS_URL = `${protocol}//${host}/ws/client`;

        const ACTIVITY_ICONS = {
            "走路": "🚶", "跑步": "🏃", "跳跃": "⬆️", "高抬腿": "🦵", "等待数据...": "❓"
        };
        const ACTIVITY_COLORS = {
            "走路": "#3b82f6", "跑步": "#f59e0b", "跳跃": "#ef4444", "高抬腿": "#8b5cf6"
        };

        // 显示调试信息
        document.getElementById('debug-ws-url').textContent = WS_URL;

        // ==========================================
        // 地图初始化
        // ==========================================
        let map = null, path = [], polyline = null, currentMarker = null;

        try {
            map = new AMap.Map('map', {
                zoom: 16,
                center: [116.397428, 39.90923],
            });
            polyline = new AMap.Polyline({
                path: path,
                strokeColor: "#3b82f6",
                strokeWeight: 4,
                strokeOpacity: 0.8
            });
            polyline.setMap(map);
            document.getElementById('map-fallback').style.display = 'none';
        } catch (e) {
            console.warn('高德地图初始化失败:', e);
            document.getElementById('map-fallback').style.display = 'flex';
            document.getElementById('map-fallback').innerHTML = `
                <div class="text-center text-slate-500">
                    <div class="text-4xl mb-2">⚠️</div>
                    <div class="text-sm font-semibold">地图未配置</div>
                    <div class="text-xs mt-1 text-slate-400 max-w-xs">请在 index.html 中将 YOUR_AMAP_KEY<br>替换为高德地图 JS API Key</div>
                </div>`;
        }

        // ==========================================
        // ECharts 初始化
        // ==========================================
        const chart = echarts.init(document.getElementById('chart'));
        const maxPoints = 200;
        let accData = { x: [], y: [], z: [] };
        let gyroData = { x: [], y: [], z: [] };
        let timeLabels = [];

        chart.setOption({
            animation: false,
            grid: [
                { left: 50, right: 20, top: 30, bottom: 20, height: '35%' },
                { left: 50, right: 20, top: '55%', bottom: 20, height: '35%' }
            ],
            legend: { data: ['Acc X', 'Acc Y', 'Acc Z', 'Gyro X', 'Gyro Y', 'Gyro Z'], top: 0, textStyle: { fontSize: 11 } },
            xAxis: [
                { type: 'category', gridIndex: 0, data: [], axisLabel: { show: false } },
                { type: 'category', gridIndex: 1, data: [], axisLabel: { show: false } }
            ],
            yAxis: [
                { type: 'value', gridIndex: 0, name: '加速度 (m/s²)', nameTextStyle: { fontSize: 10 }, axisLabel: { fontSize: 10 } },
                { type: 'value', gridIndex: 1, name: '角速度 (rad/s)', nameTextStyle: { fontSize: 10 }, axisLabel: { fontSize: 10 } }
            ],
            series: [
                { name: 'Acc X', type: 'line', xAxisIndex: 0, yAxisIndex: 0, data: [], showSymbol: false, lineStyle: { width: 1.5, color: '#ef4444' } },
                { name: 'Acc Y', type: 'line', xAxisIndex: 0, yAxisIndex: 0, data: [], showSymbol: false, lineStyle: { width: 1.5, color: '#22c55e' } },
                { name: 'Acc Z', type: 'line', xAxisIndex: 0, yAxisIndex: 0, data: [], showSymbol: false, lineStyle: { width: 1.5, color: '#3b82f6' } },
                { name: 'Gyro X', type: 'line', xAxisIndex: 1, yAxisIndex: 1, data: [], showSymbol: false, lineStyle: { width: 1.5, color: '#f97316' } },
                { name: 'Gyro Y', type: 'line', xAxisIndex: 1, yAxisIndex: 1, data: [], showSymbol: false, lineStyle: { width: 1.5, color: '#eab308' } },
                { name: 'Gyro Z', type: 'line', xAxisIndex: 1, yAxisIndex: 1, data: [], showSymbol: false, lineStyle: { width: 1.5, color: '#06b6d4' } },
            ]
        });

        // ==========================================
        // WebSocket 连接
        // ==========================================
        let ws = null;
        let lastMobileTime = 0;
        let packetCount = 0;
        let reconnectTimer = null;

        function connect() {
            if (ws && (ws.readyState === WebSocket.CONNECTING || ws.readyState === WebSocket.OPEN)) {
                log('ℹ️ 连接已存在，跳过');
                return;
            }

            log(`🔗 正在连接: ${WS_URL}`);
            document.getElementById('debug-state').textContent = '连接中...';

            try {
                ws = new WebSocket(WS_URL);
            } catch (e) {
                log('❌ 创建 WebSocket 失败: ' + e.message);
                document.getElementById('debug-state').textContent = '创建失败';
                scheduleReconnect();
                return;
            }

            ws.onopen = () => {
                updateBackendStatus(true);
                log('✅ WebSocket 已连接');
                document.getElementById('debug-state').textContent = '已连接';
                if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
            };

            ws.onmessage = (event) => {
                try {
                    const data = JSON.parse(event.data);
                    handleData(data);
                } catch (e) {
                    log('⚠️ 数据解析失败');
                }
            };

            ws.onclose = (event) => {
                updateBackendStatus(false);
                updateMobileStatus(false);
                log(`❌ 连接断开 (code: ${event.code})`);
                document.getElementById('debug-state').textContent = `已断开(${event.code})`;
                scheduleReconnect();
            };

            ws.onerror = (err) => {
                log('⚠️ WebSocket 错误，检查后端是否运行');
                document.getElementById('debug-state').textContent = '错误';
            };
        }

        function scheduleReconnect() {
            if (reconnectTimer) return;
            log('⏳ 3秒后自动重连...');
            reconnectTimer = setTimeout(() => {
                reconnectTimer = null;
                connect();
            }, 3000);
        }

        // ==========================================
        // 状态更新
        // ==========================================
        function updateBackendStatus(connected) {
            const dot = document.getElementById('ws-status-dot');
            const text = document.getElementById('ws-status-text');
            if (connected) {
                dot.className = 'status-dot online';
                text.textContent = '已连接';
                text.className = '';
            } else {
                dot.className = 'status-dot offline';
                text.textContent = '未连接';
                text.className = 'text-slate-400';
            }
        }

        function updateMobileStatus(online) {
            const dot = document.getElementById('mobile-status-dot');
            const text = document.getElementById('mobile-status-text');
            if (online) {
                dot.className = 'status-dot online';
                text.textContent = '在线';
                text.className = '';
            } else {
                dot.className = 'status-dot offline';
                text.textContent = '离线';
                text.className = 'text-slate-400';
            }
        }

        // ==========================================
        // 数据处理
        // ==========================================
        let collecting = false;

        function resetSessionUI() {
            // 重置轨迹、图表与计数，准备新一段录制
            path = [];
            if (polyline) polyline.setPath(path);
            if (currentMarker) { map.remove(currentMarker); currentMarker = null; }
            document.getElementById('track-count').textContent = 0;
            timeLabels = [];
            accData = { x: [], y: [], z: [] };
            gyroData = { x: [], y: [], z: [] };
            chart.setOption({
                xAxis: [{ data: [] }, { data: [] }],
                series: [{ data: [] }, { data: [] }, { data: [] }, { data: [] }, { data: [] }, { data: [] }]
            });
        }

        function handleData(data) {
            // —— 控制事件 ——
            if (data.event === "session_start") {
                collecting = true;
                resetSessionUI();
                updateMobileStatus(true);
                lastMobileTime = Date.now();
                document.getElementById('activity-text').textContent = '采集中...';
                document.getElementById('activity-icon').textContent = '📡';
                document.getElementById('confidence').textContent = '--';
                document.getElementById('mode-badge').innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-yellow-300"></span><span>采集中</span>';
                log('📡 开始采集，实时波形显示中...');
                return;
            }
            if (data.event === "session_result") {
                collecting = false;
                const activity = data.activity || "未知";
                document.getElementById('activity-text').textContent = activity;
                document.getElementById('activity-icon').textContent = ACTIVITY_ICONS[activity] || "❓";
                document.getElementById('confidence').textContent = ((data.confidence || 0) * 100).toFixed(1);
                const modeBadge = document.getElementById('mode-badge');
                if (activity === "数据不足") {
                    modeBadge.innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-red-400"></span><span>数据不足</span>';
                    log('⚠️ ' + (data.message || '数据不足，无法判定'));
                } else {
                    modeBadge.innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-blue-300"></span><span>最终判定</span>';
                    log(`✅ 判定结果: ${activity} | 置信度 ${((data.confidence||0)*100).toFixed(1)}% | 时长 ${data.duration_sec||0}s | ${data.sample_count||0} 帧`);
                }
                return;
            }

            // —— 普通实时数据包（仅显示波形，不实时判定）——
            updateMobileStatus(true);
            lastMobileTime = Date.now();
            setTimeout(() => {
                if (Date.now() - lastMobileTime > 3000) updateMobileStatus(false);
            }, 3500);

            const timeStr = data.server_time ? data.server_time.split('T')[1].split('.')[0] : '--:--:--';
            document.getElementById('clock').textContent = timeStr;

            // 运动状态：采集阶段不实时判定，仅显示“采集中”
            if (!collecting) {
                document.getElementById('activity-text').textContent = '等待数据...';
                document.getElementById('activity-icon').textContent = '❓';
                document.getElementById('confidence').textContent = '--';
                document.getElementById('mode-badge').innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-slate-300"></span><span>待机</span>';
            } else {
                document.getElementById('activity-text').textContent = '采集中...';
                document.getElementById('activity-icon').textContent = '📡';
                document.getElementById('mode-badge').innerHTML = '<span class="w-1.5 h-1.5 rounded-full bg-yellow-300"></span><span>采集中</span>';
            }

            // 参数
            const acc = data.acc || [0,0,0];
            const gyro = data.gyro || [0,0,0];
            const accMag = Math.sqrt(acc[0]**2 + acc[1]**2 + acc[2]**2).toFixed(2);
            const gyroMag = Math.sqrt(gyro[0]**2 + gyro[1]**2 + gyro[2]**2).toFixed(2);
            document.getElementById('acc-mag').textContent = accMag;
            document.getElementById('gyro-mag').textContent = gyroMag;
            document.getElementById('raw-acc').textContent = `[${acc.map(v=>v.toFixed(2)).join(', ')}]`;
            document.getElementById('raw-gyro').textContent = `[${gyro.map(v=>v.toFixed(2)).join(', ')}]`;

            // GPS
            const gps = data.gps || {};
            document.getElementById('gps-lat').textContent = gps.lat ? gps.lat.toFixed(6) : '--';
            document.getElementById('gps-lng').textContent = gps.lng ? gps.lng.toFixed(6) : '--';

            // 地图轨迹
            if (gps.lat && gps.lng && map) {
                const pos = [gps.lng, gps.lat];
                path.push(pos);
                polyline.setPath(path);
                map.setCenter(pos);
                if (currentMarker) map.remove(currentMarker);
                currentMarker = new AMap.Marker({
                    position: pos,
                    offset: new AMap.Pixel(-8, -8)
                });
                currentMarker.setMap(map);
                document.getElementById('track-count').textContent = path.length;
            }

            // 调试信息
            packetCount++;
            document.getElementById('debug-packets').textContent = packetCount;
            document.getElementById('debug-last').textContent = new Date().toLocaleTimeString();

            // 图表
            updateChart(acc, gyro);
        }

        function updateChart(acc, gyro) {
            timeLabels.push(new Date().toLocaleTimeString('zh-CN', {hour12:false, hour:'2-digit', minute:'2-digit', second:'2-digit'}));
            accData.x.push(acc[0]); accData.y.push(acc[1]); accData.z.push(acc[2]);
            gyroData.x.push(gyro[0]); gyroData.y.push(gyro[1]); gyroData.z.push(gyro[2]);

            if (timeLabels.length > maxPoints) {
                timeLabels.shift();
                accData.x.shift(); accData.y.shift(); accData.z.shift();
                gyroData.x.shift(); gyroData.y.shift(); gyroData.z.shift();
            }

            chart.setOption({
                xAxis: [{ data: timeLabels }, { data: timeLabels }],
                series: [
                    { data: accData.x }, { data: accData.y }, { data: accData.z },
                    { data: gyroData.x }, { data: gyroData.y }, { data: gyroData.z },
                ]
            });
        }

        // ==========================================
        // 日志
        // ==========================================
        function log(msg) {
            const container = document.getElementById('log-container');
            const div = document.createElement('div');
            const time = new Date().toLocaleTimeString('zh-CN', {hour12:false});
            div.innerHTML = `<span class="text-slate-400">[${time}]</span> ${msg}`;
            container.appendChild(div);
            container.scrollTop = container.scrollHeight;
            while (container.children.length > 30) container.removeChild(container.firstChild);
        }

        // ==========================================
        // 启动
        // ==========================================
        window.addEventListener('load', () => {
            log('📊 监控端已加载');
            log(`🌐 WebSocket 地址: ${WS_URL}`);
            log('💡 等待后端连接...');
            connect();
        });

        window.addEventListener('resize', () => chart.resize());
    </script>
</body>
</html>
